<!doctype html>
<html>
  <head>
    <title>Student Idea Submission</title>
    <link rel="stylesheet" href="Student-idea.css" />
  </head>

  <body>
    <div class="container">
      <h1>Share Your Unique Idea or thoughts for Smart study progress</h1>
      <p>Students can submit innovative ideas for teachers.</p>

      <div class="idea-box">
        <form>
          <label>Idea Title</label>
          <input type="text" placeholder="Enter your idea title" />

          <label>Category</label>
          <select>
            <option>logical thinking</option>
            <option>Any purpose</option>
            <option>Research Topic</option>
            <option>Smart Mindset</option>
          </select>

          <label>Idea Description</label>
          <textarea placeholder="Describe your idea in detail"></textarea>

          <label>Upload Supporting File by one click</label>
          <input type="file" />

          <button type="submit">Submit Your unique Idea</button>
        </form>
      </div>
    </div>
  </body>
</html>
