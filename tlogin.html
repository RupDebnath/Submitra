<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" >
    <title>TEACHER LOGIN</title>
    <link rel="stylesheet" href="tlogin.css" >
  </head>
  <body>
    <div class="container">
      <div class="login-box">
        <h2>TEACHER LOGIN</h2>
        <form action="#" method="POST">
          <div class="input-box">
            <label>Email</label>
            <input type="email" placeholder="Enter Your Email" required >
          </div>

          <div class="input-box">
            <label>Password</label>
            <input type="password" placeholder="Enter Your Password" required autocomplete="current-password" >
          </div>

          <div class="links">
            <a href="#">Forgot Password?</a>
          </div>

          <button type="submit" name="submit">Login</button>

          <div class="SIGNUP">
            <p>
              Don't have an account?
              <a href="#">SIGN UP</a>
            </p>
          </div>

          <div class="home">
            <a href="#" id="bk">← Back to Home</a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
